# screen color
set -g default-terminal "${TERM}"

# True color support
set -g terminal-features ',*:Tc'
set -ga terminal-features ',*:RGB'

set-option -g extended-keys on
set -g extended-keys-format csi-u

# Move status bar to top
set -g status-position top

# Don't detach when a session is destroyed
set -g detach-on-destroy off

# rebind prefix
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Sort sessions by name
bind s choose-tree -sZ -O name
bind w choose-tree -wZ -O name

# unbind annoying layout cycling 
unbind Space

# increase scrollback buffer size
# originally done to fix claude code scrolling issue but we have the ram so why not
set -g history-limit 50000

# rebind search to reverse search
bind-key / copy-mode \; send-key ?

# window splitting
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind \\ split-window -v -c "#{pane_current_path}"

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# window resizing
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r Left resize-pane -L 5

# maximize pane
bind -r m resize-pane -Z

# enable mouse support 
set -g mouse on

# start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# vim improvements 
set -sg escape-time 0
set -g focus-events on

# vim movements for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

# don't exit copy mode after dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Automatically renumber windows after deleting one
set -g renumber-windows on

# Don't auto-rename windows
setw -g automatic-rename off

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# theme
set -g @plugin 'catppuccin/tmux'

# Smart pane switching and resizing
set -g @plugin 'mrjones2014/smart-splits.nvim'

# Quick-jump hints for URLs, paths, hashes, etc.
#   prefix-F          : hint mode (type hint to copy)
#   prefix-F + Ctrl   : copy + open (URL -> browser, file -> default app)
#   prefix-F + Shift  : copy + paste
#   prefix-J          : jump mode (move cursor to match)
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-show-copied-notification 1

# Session switcher (sesh): Enter to connect, C-y to copy the entry's path
bind-key O display-popup -E -w 80% -h 70% "~/.config/tmux/sesh-picker.sh"

# Fuzzy window switcher across all sessions on `W`.
bind-key W display-popup -E -w 60% -h 60% "~/.config/tmux/window-picker.sh"

# Move the current window into another session, picked with sesh.
# Replaces the default move-window prompt on `.`.
bind-key . display-popup -E -w 60% -h 60% "~/.config/tmux/move-window-picker.sh"

# Workmux dashboard
bind-key D display-popup -E -w 90% -h 90% "workmux dashboard"

# GitHub attention (worktree-aware): browse what needs attention, jump to the
# worktree window if checked out, and prune worktrees whose PR has landed
bind-key P display-popup -E -w 90% -h 90% "~/.config/tmux/github-attn-popup.sh"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Configure catppuccin
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_directory}"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# GitHub attention module: review requests / your PRs / mentions across all repos.
# Built inline from catppuccin's palette + separators so it matches the theme
# and is immune to plugin load order (everything expands lazily at draw time).
set -ag status-right "#[fg=#{E:@thm_mauve}]#{E:@catppuccin_status_left_separator}#[fg=#{E:@thm_crust},bg=#{E:@thm_mauve}] gh #[fg=#{E:@thm_fg},bg=#{E:@catppuccin_status_module_text_bg}] #($HOME/.local/bin/github-attn-tmux) #[fg=#{E:@catppuccin_status_module_text_bg},bg=default]#{E:@catppuccin_status_right_separator}"

# Prunable worktrees nudge: shows "🧹N" only when worktrees can be cleaned up
# (empty otherwise), driven by the local worktree-prune poller.
set -ag status-right "#($HOME/.local/bin/worktree-prune-status)"

# Continuously/automatically runs resurrect
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Core of saving and restoring tmux environment
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'off'

# Programs to relaunch on restore (resurrect only restores a small default
# whitelist otherwise, e.g. nvim). Native binaries match by name; pi is a node
# script, so the ~ prefix matches its full command line and reruns it.
set -g @resurrect-processes 'lazygit "~pi-coding-agent"'

# Initialize TMUX plugin manager after all plugin configuration
run '~/.tmux/plugins/tpm/tpm'

# Keep prompts and messages from revealing window tabs underneath
# https://github.com/catppuccin/tmux/issues/600
set -gF message-style "fg=#{@thm_teal},bg=#{@_ctp_status_bg},fill=#{@_ctp_status_bg}"
set -gF message-command-style "fg=#{@thm_teal},bg=#{@_ctp_status_bg},fill=#{@_ctp_status_bg}"
